<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

/* ═══════════════════════════════════════════════════════════════════════
   SABDA Cherry Blossom — 360° Immersive Projection
   Soft pink, falling petals, late afternoon warmth
   Room: 15.00m × 5.63m × 3.23m — 4 walls, Watchout playback
   ═══════════════════════════════════════════════════════════════════════ */

// ── WALL DIMENSIONS (from Unity Spout) ──
const W_LEFT   = 5008, H_WALL = 1200;
const W_RIGHT  = 5008;
const W_FRONT  = 1920;
const W_BACK   = 1920;
const OUT_W = W_LEFT + W_FRONT;   // 6928
const OUT_H = H_WALL * 2;         // 2400

// ── SABDA ROOM GEOMETRY (for azimuth mapping) ──
const ROOM_L = 15.00;   // long walls (Left/Right)
const ROOM_W = 5.63;    // short walls (Front/Back)
const PERIM = 2 * ROOM_L + 2 * ROOM_W;  // 41.26m

const uF = ROOM_W / PERIM;
const uR = (ROOM_W + ROOM_L) / PERIM;
const uB = (2 * ROOM_W + ROOM_L) / PERIM;

// ── SHARED CONSTANTS ──
const EYE_H = 1.6;

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({
  antialias: false,
  powerPreference: 'high-performance',
});
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setPixelRatio(1);
renderer.setSize(OUT_W, OUT_H);
document.body.appendChild(renderer.domElement);

// ═══════════════════════════════════════════════════════
// CONTENT SCENE
// ═══════════════════════════════════════════════════════
const contentScene = new THREE.Scene();

const CUBE_SIZE = 4096;
const cubeRT = new THREE.WebGLCubeRenderTarget(CUBE_SIZE, {
  generateMipmaps: true,
  minFilter: THREE.LinearMipmapLinearFilter,
  type: THREE.UnsignedByteType,
});
const cubeCamera = new THREE.CubeCamera(0.05, 500, cubeRT);
cubeCamera.position.set(0, EYE_H, 0);
contentScene.add(cubeCamera);

// ═══════════════════════════════════════════════════════
// 4 EQUIRECT WALL RENDER TARGETS
// ═══════════════════════════════════════════════════════
const VFOV_RAD = 62.5 * Math.PI / 180.0;
const ELEV_OFFSET = 3.0 * Math.PI / 180.0;

function makeWallRT(w, h) {
  return new THREE.WebGLRenderTarget(w, h, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    colorSpace: THREE.SRGBColorSpace,
  });
}

const rtFront = makeWallRT(W_FRONT, H_WALL);
const rtBack  = makeWallRT(W_BACK, H_WALL);
const rtLeft  = makeWallRT(W_LEFT, H_WALL);
const rtRight = makeWallRT(W_RIGHT, H_WALL);

function makeEquirectMat(azStartFrac, azEndFrac) {
  const azStart = azStartFrac * Math.PI * 2;
  const azEnd   = azEndFrac * Math.PI * 2;
  return new THREE.ShaderMaterial({
    uniforms: {
      tCube: { value: null },
      vFovRad: { value: VFOV_RAD },
      elevOffset: { value: ELEV_OFFSET },
      azStart: { value: azStart },
      azRange: { value: azEnd - azStart },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
    `,
    fragmentShader: `
      precision highp float;
      uniform samplerCube tCube;
      uniform float vFovRad, elevOffset, azStart, azRange;
      varying vec2 vUv;
      float dither(vec2 co) {
        return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453) - 0.5;
      }
      void main() {
        float azimuth = azStart + vUv.x * azRange;
        float elevation = (vUv.y - 0.5) * vFovRad + elevOffset;
        float ce = cos(elevation);
        vec3 dir = vec3(sin(azimuth) * ce, sin(elevation), -cos(azimuth) * ce);
        vec4 col = textureCube(tCube, dir);

        // ── PROJECTION OPTIMIZATION (cherry blossom — softer than murmuration) ──
        // 1. Black floor lift
        col.rgb = col.rgb * 0.97 + 0.015;
        // 2. S-curve contrast — gentle for soft dreamy feel
        vec3 scurve = col.rgb * col.rgb * (3.0 - 2.0 * col.rgb);
        col.rgb = mix(col.rgb, scurve, 0.65);
        // 3. Saturation — warm pink emphasis
        float luma = dot(col.rgb, vec3(0.299, 0.587, 0.114));
        col.rgb = mix(vec3(luma), col.rgb, 1.25);
        // 4. Highlight ceiling — soft
        col.rgb = min(col.rgb, 0.88 + (col.rgb - 0.88) * 0.3);
        // 5. Vertical edge blend
        float topBottomFade = smoothstep(0.0, 0.02, vUv.y) * smoothstep(1.0, 0.98, vUv.y);
        col.rgb *= topBottomFade * 0.05 + 0.95;

        col.rgb += dither(gl_FragCoord.xy) / 255.0;
        gl_FragColor = col;
      }
    `,
    depthWrite: false, depthTest: false,
  });
}

const matFront = makeEquirectMat(0.0, uF);
const matRight = makeEquirectMat(uF, uR);
const matBack  = makeEquirectMat(uR, uB);
const matLeft  = makeEquirectMat(uB, 1.0);

function makeEquirectScene(mat) {
  const s = new THREE.Scene();
  s.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));
  return s;
}
const eqScnFront = makeEquirectScene(matFront);
const eqScnRight = makeEquirectScene(matRight);
const eqScnBack  = makeEquirectScene(matBack);
const eqScnLeft  = makeEquirectScene(matLeft);
const eqCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ═══════════════════════════════════════════════════════
// 3D ROOM VIEWER — press R to toggle
// SABDA room: 15.00m(L) × 5.63m(W) × 3.23m(H)
// ═══════════════════════════════════════════════════════
const ROOM_H = 3.23;
const roomScene = new THREE.Scene();
roomScene.background = new THREE.Color(0x1a0a10);
const roomCamera = new THREE.PerspectiveCamera(75, OUT_W/OUT_H, 0.1, 100);
roomCamera.position.set(0, EYE_H, 0);
let roomControls = null;

function makeRoomWallMat(azStartFrac, azEndFrac) {
  const azStart = azStartFrac * Math.PI * 2;
  const azEnd   = azEndFrac * Math.PI * 2;
  return new THREE.ShaderMaterial({
    uniforms: {
      tCube: { value: null },
      vFovRad: { value: VFOV_RAD },
      elevOffset: { value: ELEV_OFFSET },
      azStart: { value: azStart },
      azRange: { value: azEnd - azStart },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform samplerCube tCube;
      uniform float vFovRad, elevOffset, azStart, azRange;
      varying vec2 vUv;
      float dither(vec2 co) {
        return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453) - 0.5;
      }
      void main() {
        float azimuth = azStart + vUv.x * azRange;
        float elevation = (vUv.y - 0.5) * vFovRad + elevOffset;
        float ce = cos(elevation);
        vec3 dir = vec3(sin(azimuth) * ce, sin(elevation), -cos(azimuth) * ce);
        vec4 col = textureCube(tCube, dir);
        col.rgb = col.rgb * 0.96 + 0.02;
        vec3 scurve = col.rgb * col.rgb * (3.0 - 2.0 * col.rgb);
        col.rgb = mix(col.rgb, scurve, 0.45);
        float luma = dot(col.rgb, vec3(0.299, 0.587, 0.114));
        col.rgb = mix(vec3(luma), col.rgb, 1.25);
        col.rgb = min(col.rgb, 0.90 + (col.rgb - 0.90) * 0.4);
        float topBottomFade = smoothstep(0.0, 0.02, vUv.y) * smoothstep(1.0, 0.98, vUv.y);
        col.rgb *= topBottomFade * 0.05 + 0.95;
        col.rgb += dither(gl_FragCoord.xy) * 1.5 / 255.0;
        gl_FragColor = col;
      }
    `,
    side: THREE.FrontSide,
  });
}

const matRoomFront = makeRoomWallMat(0.0, uF);
const matRoomRight = makeRoomWallMat(uF, uR);
const matRoomBack  = makeRoomWallMat(uR, uB);
const matRoomLeft  = makeRoomWallMat(uB, 1.0);

const wF = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), matRoomFront);
wF.position.set(0, ROOM_H/2, -ROOM_L/2);
roomScene.add(wF);

const wR = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_L, ROOM_H), matRoomRight);
wR.rotation.y = -Math.PI/2;
wR.position.set(ROOM_W/2, ROOM_H/2, 0);
roomScene.add(wR);

const wB = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), matRoomBack);
wB.rotation.y = Math.PI;
wB.position.set(0, ROOM_H/2, ROOM_L/2);
roomScene.add(wB);

const wL = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_L, ROOM_H), matRoomLeft);
wL.rotation.y = Math.PI/2;
wL.position.set(-ROOM_W/2, ROOM_H/2, 0);
roomScene.add(wL);

const floorMat = new THREE.MeshBasicMaterial({color: 0x2a2a2a});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_L), floorMat);
floor.rotation.x = -Math.PI/2;
roomScene.add(floor);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_L), new THREE.MeshBasicMaterial({color: 0x111111}));
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = ROOM_H;
roomScene.add(ceiling);

roomScene.add(new THREE.HemisphereLight(0xe8b4c8, 0x1a1018, 0.15));
roomScene.add(new THREE.AmbientLight(0xffffff, 0.1));

let roomMode = false;

const roomRT = new THREE.WebGLRenderTarget(OUT_W, OUT_H, {
  minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
  colorSpace: THREE.SRGBColorSpace,
});
const roomBlitScene = new THREE.Scene();
const roomBlitCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const roomBlitQuad = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.MeshBasicMaterial({ map: roomRT.texture })
);
roomBlitScene.add(roomBlitQuad);

// ═══════════════════════════════════════════════════════
// COMPOSITE SCENE
// ═══════════════════════════════════════════════════════
const compScene = new THREE.Scene();
const compCam = new THREE.OrthographicCamera(0, OUT_W, OUT_H, 0, -1, 1);

function makeQuad(rt, x, y, w, h) {
  const mat = new THREE.MeshBasicMaterial({ map: rt.texture });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.position.set(x + w/2, y + h/2, 0);
  return mesh;
}

compScene.add(makeQuad(rtLeft,  0,       H_WALL, W_LEFT,  H_WALL));
compScene.add(makeQuad(rtFront, W_LEFT,  H_WALL, W_FRONT, H_WALL));
compScene.add(makeQuad(rtRight, 0,       0,      W_RIGHT, H_WALL));
compScene.add(makeQuad(rtBack,  W_RIGHT, 0,      W_BACK,  H_WALL));

// ── PROJECTOR SIMULATION SCENES ──
let projMode = 0;
const STRIP_W = W_LEFT + W_FRONT;
const STRIP_H = H_WALL;

const projTopScene = new THREE.Scene();
const projTopCam = new THREE.OrthographicCamera(0, STRIP_W, STRIP_H, 0, -1, 1);
projTopScene.add(makeQuad(rtLeft,  0,      0, W_LEFT,  H_WALL));
projTopScene.add(makeQuad(rtFront, W_LEFT, 0, W_FRONT, H_WALL));

const projBotScene = new THREE.Scene();
const projBotCam = new THREE.OrthographicCamera(0, STRIP_W, STRIP_H, 0, -1, 1);
projBotScene.add(makeQuad(rtRight, 0,       0, W_RIGHT, H_WALL));
projBotScene.add(makeQuad(rtBack,  W_RIGHT, 0, W_BACK,  H_WALL));

// ── GUIDE OVERLAYS (toggle with D key) ──
const guideGroup = new THREE.Group();
const divGeo = new THREE.PlaneGeometry(OUT_W, 3);
const divMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
const divLine = new THREE.Mesh(divGeo, divMat);
divLine.position.set(OUT_W/2, H_WALL/2, 0.1);
guideGroup.add(divLine);

const vdivGeo = new THREE.PlaneGeometry(3, OUT_H);
const vdivLine = new THREE.Mesh(vdivGeo, divMat);
vdivLine.position.set(W_LEFT, OUT_H/2, 0.1);
guideGroup.add(vdivLine);

function makeLabel(text, x, y) {
  const cvs = document.createElement('canvas');
  cvs.width = 512; cvs.height = 48;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 512, 48);
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#ff3333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 24);
  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(280, 30), mat);
  mesh.position.set(x, y, 0.2);
  return mesh;
}
guideGroup.add(makeLabel('LEFT (5008×1200)',  W_LEFT/2,  OUT_H - 25));
guideGroup.add(makeLabel('FRONT (1920×1200)', W_LEFT + W_FRONT/2, OUT_H - 25));
guideGroup.add(makeLabel('RIGHT (5008×1200)', W_RIGHT/2, H_WALL - 25));
guideGroup.add(makeLabel('BACK (1920×1200)',  W_RIGHT + W_BACK/2, H_WALL - 25));

let showGuides = false;
guideGroup.visible = false;
compScene.add(guideGroup);
document.addEventListener('keydown', e => {
  if (e.key === 'd' || e.key === 'D') {
    showGuides = !showGuides;
    guideGroup.visible = showGuides;
  }
  if (e.key === 'p' || e.key === 'P') {
    projMode = (projMode + 1) % 3;
    const labels = ['BOTH STRIPS', 'TOP STRIP (Left+Front)', 'BOTTOM STRIP (Right+Back)'];
    const lbl = document.getElementById('projLabel');
    if(lbl){ lbl.textContent = labels[projMode]; lbl.style.opacity = 1;
      clearTimeout(lbl._t); lbl._t = setTimeout(()=>{ lbl.style.opacity = 0; }, 2000); }
  }
  if (e.key === 'r' || e.key === 'R') {
    roomMode = !roomMode;
    if (roomMode && !roomControls) {
      import('three/addons/controls/OrbitControls.js').then(mod => {
        roomControls = new mod.OrbitControls(roomCamera, renderer.domElement);
        roomControls.target.set(0, EYE_H, -0.01);
        roomControls.enablePan = false;
        roomControls.enableZoom = false;
        roomControls.rotateSpeed = 0.5;
      });
    }
    if (roomControls) roomControls.enabled = roomMode;
    const lbl = document.getElementById('projLabel');
    if(lbl){ lbl.textContent = roomMode ? '360° ROOM VIEW (drag to look around)' : 'STRIP VIEW'; lbl.style.opacity = 1;
      clearTimeout(lbl._t); lbl._t = setTimeout(()=>{ lbl.style.opacity = 0; }, 3000); }
  }
});


// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// SCENE CONTENT — Cherry Blossom Grove v6
// ═══════════════════════════════════════════════════════

const DURATION = 1800;

// ── HELPERS ──
const tl = new THREE.TextureLoader();
function b64T(id, mime) {
  const raw = document.getElementById(id)?.textContent?.trim();
  if (!raw || raw === 'ASSET_PLACEHOLDER') return null;
  const t = tl.load('data:' + mime + ';base64,' + raw);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function b64Blob(id) {
  const raw = document.getElementById(id)?.textContent?.trim();
  if (!raw || raw === 'ASSET_PLACEHOLDER') return null;
  const binStr = atob(raw);
  const len = binStr.length;
  const bytes = new Uint8Array(len);
  const CHUNK = 32768;
  for (let offset = 0; offset < len; offset += CHUNK) {
    const end = Math.min(offset + CHUNK, len);
    for (let i = offset; i < end; i++) bytes[i] = binStr.charCodeAt(i);
  }
  return URL.createObjectURL(new Blob([bytes], { type: 'model/gltf-binary' }));
}

// ── DUAL SKY ──
const skyTexA = b64T('skydata_a', 'image/jpeg');
skyTexA.mapping = THREE.EquirectangularReflectionMapping;
skyTexA.anisotropy = renderer.capabilities.getMaxAnisotropy();
skyTexA.minFilter = THREE.LinearMipmapLinearFilter;
skyTexA.generateMipmaps = true;

const skyTexB = b64T('skydata_b', 'image/jpeg');
skyTexB.mapping = THREE.EquirectangularReflectionMapping;
skyTexB.anisotropy = renderer.capabilities.getMaxAnisotropy();
skyTexB.minFilter = THREE.LinearMipmapLinearFilter;
skyTexB.generateMipmaps = true;

const skySphereMat = new THREE.ShaderMaterial({
  uniforms: {
    texA: { value: skyTexA }, texB: { value: skyTexB },
    mixVal: { value: 0.0 },
    tintColor: { value: new THREE.Color(1.0, 0.90, 0.93) },
  },
  vertexShader: `varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    precision highp float;
    uniform sampler2D texA, texB; uniform float mixVal; uniform vec3 tintColor; varying vec2 vUv;
    float dither(vec2 co){return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453)-0.5;}
    void main(){
      vec3 col = mix(texture2D(texA,vUv).rgb, texture2D(texB,vUv).rgb, mixVal) * tintColor;
      float luma = dot(col, vec3(0.299,0.587,0.114));
      col = mix(vec3(luma), col, 0.65);
      col = (col-0.5)*0.85+0.5;
      col = min(col, vec3(0.82));
      // Fade lower hemisphere to fog
      float horizonFade = smoothstep(0.38, 0.46, vUv.y);
      col = mix(vec3(0.78,0.68,0.72), col, horizonFade);
      col = clamp(col, 0.0, 1.0) + dither(gl_FragCoord.xy)/255.0;
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.BackSide
});
const skySphere = new THREE.Mesh(new THREE.SphereGeometry(400, 64, 32), skySphereMat);
contentScene.add(skySphere);
contentScene.background = new THREE.Color(0xd0a8b8);
contentScene.environment = skyTexA;

// ── LIGHTING ──
const ambient = new THREE.AmbientLight(0xc89898, 0.30);
contentScene.add(ambient);
const hemi = new THREE.HemisphereLight(0xffd0b0, 0x3a2030, 0.45);
contentScene.add(hemi);
const sun = new THREE.DirectionalLight(0xffe0c0, 1.10);
sun.position.set(8, 12, -10); contentScene.add(sun);
const rim = new THREE.DirectionalLight(0xffb0c0, 0.25);
rim.position.set(-10, 6, 8); contentScene.add(rim);
const fill = new THREE.DirectionalLight(0xc0a0b8, 0.20);
fill.position.set(0, 4, 12); contentScene.add(fill);

// ── FOG ──
contentScene.fog = new THREE.FogExp2(0xd0a0b0, 0.018);

// ── GOD RAYS (subtle) ──
const godRayGroup = new THREE.Group();
for(let i=0;i<5;i++){
  const angle=(i/5)*Math.PI*2+Math.random()*0.3;
  const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,side:THREE.DoubleSide,
    uniforms:{uOpacity:{value:0.02+Math.random()*0.01}},
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`precision highp float;uniform float uOpacity;varying vec2 vUv;void main(){float f=smoothstep(0.0,0.3,vUv.y)*smoothstep(1.0,0.7,vUv.y)*smoothstep(0.0,0.5,vUv.x)*smoothstep(1.0,0.5,vUv.x);gl_FragColor=vec4(1.0,0.92,0.82,f*uOpacity);}`,
  });
  const m=new THREE.Mesh(new THREE.PlaneGeometry(1.5+Math.random()*2,25+Math.random()*10),mat);
  m.position.set(Math.cos(angle)*20,8+Math.random()*4,Math.sin(angle)*20);m.lookAt(0,EYE_H,0);
  godRayGroup.add(m);
}
contentScene.add(godRayGroup);


// ═══════════════════════════════════════════════════════
// GLB LOADING
// ═══════════════════════════════════════════════════════
const gltfLoader = new GLTFLoader();
let readyCount = 0;
const TOTAL_ASSETS = 4;
function checkReady() {
  if (++readyCount >= TOTAL_ASSETS) {
    document.getElementById('loading').classList.add('done');
    window.SABDA_READY = true;
    console.log('SABDA: All ' + TOTAL_ASSETS + ' assets loaded');
  } else { console.log('SABDA: Asset ' + readyCount + '/' + TOTAL_ASSETS); }
}
setTimeout(() => { if (!window.SABDA_READY) {
  console.warn('SABDA: 30s timeout — loaded ' + readyCount + '/' + TOTAL_ASSETS);
  document.getElementById('loading').classList.add('done'); window.SABDA_READY = true;
}}, 30000);

// ── CHERRY BLOSSOM TREES — GROVE PERSPECTIVE ──
// Trees in TWO ROWS along a path, viewer standing IN the grove looking down an avenue.
// Row 1 (left side, X negative): trees at Z = -12, -4, +4, +12
// Row 2 (right side, X positive): trees at Z = -8, 0, +8
// Distance from viewer: 6-8m sideways, stretching into fog
const treeInstances = [];
// HQ trees: 4 closest, spread around all directions
const HQ_PLACEMENTS = [
  {x: -10, z:  -5, scale: 0.75, rotY: 1.8},
];

// Original trees: 10 filling depth around full 360°
const ORIG_PLACEMENTS = [
  // Close ring (10-12m) — 8 trees
  {x:  10, z:  -7, scale: 0.90, rotY: 2.1},
  {x: -10, z:   8, scale: 0.85, rotY: 3.2},
  {x:  5,  z: -12, scale: 0.88, rotY: 0.5},
  {x: -5,  z:  12, scale: 0.92, rotY: 4.8},
  {x: -9,  z:  -2, scale: 0.82, rotY: 3.9},
  {x:  9,  z:   2, scale: 0.82, rotY: 1.5},
  {x:  2,  z: -10, scale: 0.86, rotY: 5.8},
  {x: -2,  z:  10, scale: 0.88, rotY: 0.8},
  // Mid ring (15-18m) — 6 trees
  {x: -11, z: -15, scale: 0.85, rotY: 0.3},
  {x:  11, z:  16, scale: 0.80, rotY: 3.6},
  {x:  7,  z: -18, scale: 0.78, rotY: 5.2},
  {x: -7,  z:  18, scale: 0.80, rotY: 2.7},

// Load HQ trees
{
  const url = b64Blob('treedata_hq');
  if (url) gltfLoader.load(url, (gltf) => { URL.revokeObjectURL(url); const base = gltf.scene;
    const h = new THREE.Box3().setFromObject(base).getSize(new THREE.Vector3()).y;
    const bs = 8 / h;
    for(const pl of HQ_PLACEMENTS){
      const t = base.clone(); const s = bs * pl.scale; t.scale.set(s, s, s);
      t.position.set(pl.x, -0.3, pl.z); t.rotation.y = pl.rotY;
      t.traverse(c => { if(c.isMesh){ c.castShadow = false; c.receiveShadow = false; }});
      contentScene.add(t); treeInstances.push(t);
    }
    console.log('HQ Trees: ' + HQ_PLACEMENTS.length + ', height: ' + h.toFixed(1) + ' -> 8m');
    checkReady();
  }, undefined, (e) => { console.error('HQ Tree err:', e); checkReady(); });
  else checkReady();
}

// Load original trees (depth fill)
{
  const url = b64Blob('treedata');
  if (url) gltfLoader.load(url, (gltf) => { URL.revokeObjectURL(url); const base = gltf.scene;
    const h = new THREE.Box3().setFromObject(base).getSize(new THREE.Vector3()).y;

// ── ANIMATED FALLING PETALS ──
const animPetalMixers = [];
// Place petal clusters between and around the trees — filling the avenue
const APL=[
  {x: -3, y:5, z: -6, s:1.0, r:0},
  {x:  3, y:6, z: -2, s:1.1, r:1.2},
  {x: -2, y:4, z:  2, s:0.9, r:2.5},
  {x:  4, y:5, z:  6, s:1.2, r:3.8},
  {x:  0, y:6, z:  0, s:1.0, r:0.5},
  {x: -4, y:5, z: -10,s:1.1, r:1.8},
  {x:  2, y:7, z:  10,s:0.8, r:4.2},
  {x: -1, y:4, z:  -3,s:1.3, r:2.0},
];
{
  const url = b64Blob('animpetaldata');
  if (url) gltfLoader.load(url,(gltf)=>{URL.revokeObjectURL(url);const base=gltf.scene;const clip=gltf.animations[0];
    for(let i=0;i<APL.length;i++){const pl=APL[i];const clone=SkeletonUtils.clone(base);
      clone.position.set(pl.x,pl.y,pl.z);clone.scale.setScalar(pl.s);clone.rotation.y=pl.r;
      const mixer=new THREE.AnimationMixer(clone);const action=mixer.clipAction(clip);action.play();
      action.time=(i/APL.length)*clip.duration;contentScene.add(clone);animPetalMixers.push({mixer});}
    console.log('Petals: '+APL.length);checkReady();

// ── GROUND PETAL CARPET — REMOVED (photo texture covers floor, saves 130K verts) ──
// groundpetaldata still in HTML for future use but not loaded
// ── GROUND: TWO-LAYER (sharp near + fog far) ──
// Near plane: 4K Poly Haven photoscan, tight tile density where viewer sees detail
// Far plane: fog-matched color, costs nothing, fills the distance
{
  // NEAR: 4K texture, 60m×60m, 12×12 tiles = 5m per tile = 820 px/m
  const tex = b64T('groundphotodata', 'image/jpeg');
  if (tex) {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(12, 12);
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = true;
  }
  const nearGnd = new THREE.Mesh(new THREE.PlaneGeometry(60, 60),
    new THREE.MeshBasicMaterial({ map: tex || null, color: tex ? 0xffffff : 0x3a5a2a }));
  nearGnd.rotation.x = -Math.PI / 2;
  nearGnd.position.y = -0.04;
  contentScene.add(nearGnd);

  // FAR: fog-matched so horizon blends invisibly
  const farGnd = new THREE.Mesh(new THREE.PlaneGeometry(400, 400),
    new THREE.MeshBasicMaterial({ color: 0xd0a0b0 }));
  farGnd.rotation.x = -Math.PI / 2;
  farGnd.position.y = -0.10;
  contentScene.add(farGnd);
}

// ── RABBITS — small groups hopping through the grove ──
// Rabbit model: 1597 verts, 48 joints, 0.43s hop cycle
// Paths: gentle circular arcs at different radii — not too fast, not too slow
// Real rabbit behavior: hop in groups of 2-3, pause occasionally, meander
const rabbitMixers = [];
const rabbitData = [];  // {mesh, mixer, path}

// Each rabbit: radius, speed (rad/s), startAngle, scale, y-offset
const RABBIT_PATHS = [
  // Near group (2 rabbits, close together, ~8m out)
  {r: 8, speed: 0.06, angle: 0,     scale: 0.014, buddy: 0.3},
  {r: 8.5, speed: 0.058, angle: 0.25, scale: 0.013, buddy: 0},
  // Mid group (2 rabbits, ~14m)
  {r: 14, speed: 0.04, angle: 2.0,  scale: 0.012, buddy: 0.2},
  {r: 14.5, speed: 0.042, angle: 2.15, scale: 0.011, buddy: 0},
  // Far solo (1 rabbit, ~20m, barely visible in fog)
  {r: 20, speed: 0.03, angle: 4.0,  scale: 0.010, buddy: 0},
  // Another near pair (opposite side, ~10m)
  {r: 10, speed: 0.05, angle: 3.5,  scale: 0.013, buddy: 0.25},
  {r: 10.3, speed: 0.052, angle: 3.7, scale: 0.012, buddy: 0},
];

{
  const url = b64Blob('rabbitdata');
  if (url) gltfLoader.load(url, (gltf) => { URL.revokeObjectURL(url);
    const base = gltf.scene;
    const clip = gltf.animations[0];

    for(let i = 0; i < RABBIT_PATHS.length; i++){
      const rp = RABBIT_PATHS[i];
      const clone = SkeletonUtils.clone(base);
      clone.scale.setScalar(rp.scale);
      clone.traverse(c => { if(c.isMesh){ c.castShadow = false; c.receiveShadow = false; }});
      contentScene.add(clone);

      const mixer = new THREE.AnimationMixer(clone);
      const action = mixer.clipAction(clip);
      action.play();
      // Stagger animation start so they're not all in sync
      action.time = (i / RABBIT_PATHS.length) * clip.duration;
      // Slightly vary playback speed for natural feel (0.7-1.0x — gentle hopping)
      action.timeScale = 0.7 + (i % 3) * 0.15;

      rabbitMixers.push(mixer);
      rabbitData.push({ mesh: clone, path: rp, angle: rp.angle, action: action });
    }
    console.log('Rabbits: ' + RABBIT_PATHS.length + ' on circular paths');
    checkReady();
  }, undefined, (e) => { console.error('Rabbit err:', e); checkReady(); });
  else checkReady();
}


// ═══════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════
let time = 0;
const fpsEl = document.getElementById('fps');
let fpsFrames = 0, fpsLast = performance.now();

window.SABDA_RENDERER = renderer;
window.SABDA_WALLS = {left:rtLeft,right:rtRight,front:rtFront,back:rtBack};

window.SABDA_RENDER_FRAME = function(simTime, speedMultiplier) {
  const dt = (1/30) * (speedMultiplier || 1);
  time = simTime;

  // ── SKY CROSSFADE ──
  const warmth = Math.pow((Math.sin((time/DURATION)*Math.PI*2)+1)/2, 0.5);
  skySphereMat.uniforms.mixVal.value = 1.0 - warmth;
  skySphereMat.uniforms.tintColor.value.setRGB(0.98+warmth*0.04, 0.88+warmth*0.04, 0.91+(1-warmth)*0.03);
  skySphere.rotation.y = (time/DURATION)*Math.PI*3.75;

  // ── LIGHTING ──
  sun.intensity = 0.75+warmth*0.12;
  sun.color.setRGB(1.0, 0.72+warmth*0.06, 0.54+warmth*0.04);
  ambient.intensity = 0.45+warmth*0.06;
  hemi.intensity = 0.42+warmth*0.08;
  contentScene.fog.color.setRGB(0.80+warmth*0.04, 0.62+warmth*0.03, 0.68-warmth*0.02);

  // ── ANIMATED PETALS ──
  for(const ap of animPetalMixers) ap.mixer.update(dt);

  // ── TREE SWAY ──
  for(let i=0;i<treeInstances.length;i++){
    treeInstances[i].rotation.z=Math.sin(time*0.15+i*1.7)*0.006;
    treeInstances[i].rotation.x=Math.sin(time*0.12+i*1.1+0.5)*0.003;
  }

  // ── RABBITS — calm foraging ──
  for(let i = 0; i < rabbitData.length; i++){
    const rd = rabbitData[i];
    const rp = rd.path;

    // Long gentle cycle: hop a bit, pause a lot (rabbits are calm grazers)
    const cycleLen = 8.0 + (i * 1.7) % 5.0; // 8-13 seconds per cycle
    const t_in_cycle = ((time + i * 3.1) % cycleLen) / cycleLen;

    // 30% hopping, 70% paused — rabbits spend most time grazing
    let speedFactor;
    if (t_in_cycle < 0.3) {
      speedFactor = Math.sin(t_in_cycle / 0.3 * Math.PI) * 0.7;
    } else {
      speedFactor = 0;
    }

    // Very gentle path wobble (±0.5m, not ±1.5m)
    const wobble = Math.sin(time * 0.15 + i * 5.1) * 0.5;
    const currentR = rp.r + wobble;

    // Slow path speed (was *4, now *1.5)
    rd.angle += rp.speed * 1.5 * speedFactor * dt;
    const x = Math.cos(rd.angle) * currentR;
    const z = Math.sin(rd.angle) * currentR;

    // Tiny hop bob (2cm, not 8cm)
    let bob = 0;
    if (speedFactor > 0.1) {
      const hopT = (time % 0.5) / 0.5;
      bob = Math.sin(hopT * Math.PI) * 0.02;
    }
    rd.mesh.position.set(x, bob, z);

    // Gradual turning
    const targetRotY = rd.angle - Math.PI * 0.5;
    rd.mesh.rotation.y += (targetRotY - rd.mesh.rotation.y) * Math.min(1, dt * 2);

    // Animation: gentle during hops, near-frozen during pause
    rd.action.timeScale = speedFactor > 0.1 ? 0.4 + speedFactor * 0.3 : 0.02;
    rabbitMixers[i].update(dt);
  }

  // ── GOD RAYS ──
  godRayGroup.children.forEach((r,i)=>{
    r.material.uniforms.uOpacity.value=(0.015+Math.sin(time*0.05+i*1.5)*0.008)*(0.8+warmth*0.2);
  });

  // ── RENDER ──
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.setRenderTarget(null);
  cubeCamera.update(renderer, contentScene);
  renderer.toneMapping=THREE.NoToneMapping;
  const ct=cubeRT.texture;
  matFront.uniforms.tCube.value=ct;matRight.uniforms.tCube.value=ct;
  matBack.uniforms.tCube.value=ct;matLeft.uniforms.tCube.value=ct;
  matRoomFront.uniforms.tCube.value=ct;matRoomRight.uniforms.tCube.value=ct;
  matRoomBack.uniforms.tCube.value=ct;matRoomLeft.uniforms.tCube.value=ct;
  renderer.setRenderTarget(rtFront);renderer.render(eqScnFront,eqCam);
  renderer.setRenderTarget(rtRight);renderer.render(eqScnRight,eqCam);
  renderer.setRenderTarget(rtBack);renderer.render(eqScnBack,eqCam);
  renderer.setRenderTarget(rtLeft);renderer.render(eqScnLeft,eqCam);
  renderer.setRenderTarget(null);
};

window.SABDA_STATUS = function(t) {
  const w=Math.pow((Math.sin((t/DURATION)*Math.PI*2)+1)/2,0.5);
  return 'warmth='+w.toFixed(2)+' mix='+(1-w).toFixed(2);
};

// ── LIVE PREVIEW ──
if (!window.__SABDA_PUPPETEER__) {
  const scrubDiv = document.createElement('div');
  scrubDiv.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:20px;background:rgba(0,0,0,0.7);padding:20px 40px;border-radius:12px;font-family:monospace;color:#e8b4c8;font-size:48px;';
  const slider = document.createElement('input');
  slider.type = 'range'; slider.min = 0; slider.max = 1800; slider.step = 1; slider.value = 0;
  slider.style.cssText = 'width:3000px;cursor:pointer;height:40px;';
  const info = document.createElement('span');
  info.style.cssText = 'min-width:900px;white-space:nowrap;';
  const playBtn = document.createElement('button');
  playBtn.textContent = '⏸'; playBtn.style.cssText = 'background:none;border:2px solid #e8b4c8;color:#e8b4c8;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:48px;';
  scrubDiv.appendChild(playBtn);
  scrubDiv.appendChild(slider);
  scrubDiv.appendChild(info);
  document.body.appendChild(scrubDiv);

  let liveT = 0, playing = true, scrubbing = false, timeScale = 1;
  let lastFrameTime = performance.now() / 1000;
  playBtn.onclick = () => { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; };
  slider.oninput = () => { scrubbing = true; liveT = parseFloat(slider.value); };
  slider.onchange = () => { scrubbing = false; };
  document.addEventListener('keydown', e => {
    if (e.key === 't' || e.key === 'T') {
      timeScale = timeScale === 30 ? 1 : 30;
      info.style.color = timeScale > 1 ? '#ff6666' : '#e8b4c8';
    }
    if (e.key === 'y' || e.key === 'Y') {
      timeScale = timeScale === 5 ? 1 : 5;
      info.style.color = timeScale > 1 ? '#ffaa44' : '#e8b4c8';
    }
  });

  function liveLoop() {
    const now = performance.now() / 1000;
    const realDt = Math.min(now - lastFrameTime, 0.1);
    lastFrameTime = now;
    if (playing && !scrubbing) liveT += realDt * timeScale;
    if (liveT > 1800) liveT = 0;
    if (!scrubbing) slider.value = liveT;

    const mins = Math.floor(liveT/60), secs = Math.floor(liveT%60);
    const statusStr = window.SABDA_STATUS ? window.SABDA_STATUS(liveT) : '';
    info.textContent = `${mins}:${secs.toString().padStart(2,'0')} / 30:00  ${timeScale>1?'⚡'+timeScale+'x  ':''}${statusStr}`;

    window.SABDA_RENDER_FRAME(liveT, timeScale);

    // FPS counter
    fpsFrames++;
    const nowMs = performance.now();
    if (nowMs - fpsLast > 500) {
      fpsEl.textContent = `${(fpsFrames / ((nowMs - fpsLast)/1000)).toFixed(1)} fps`;
      fpsFrames = 0; fpsLast = nowMs;
    }

    renderer.setRenderTarget(null);
    if (roomMode) {
      renderer.toneMapping = THREE.NoToneMapping;
      if (roomControls) roomControls.update();
      renderer.setRenderTarget(roomRT);
      renderer.render(roomScene, roomCamera);
      renderer.setRenderTarget(null);
      renderer.render(roomBlitScene, roomBlitCam);
    } else if (projMode === 0) {
      renderer.render(compScene, compCam);
    } else if (projMode === 1) {
      renderer.render(projTopScene, projTopCam);
    } else {
      renderer.render(projBotScene, projBotCam);
    }
    requestAnimationFrame(liveLoop);
  }
  document.getElementById('loading').classList.add('done');
  requestAnimationFrame(liveLoop);
}

</script>
